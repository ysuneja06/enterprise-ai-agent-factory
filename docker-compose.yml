services:
  api:
    build: .
    container_name: enterprise-ai-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres

    volumes:
      - ./sample-outputs:/app/sample-outputs

  postgres:
    image: postgres:16
    container_name: enterprise-ai-postgres-compose
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterprise_ai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: